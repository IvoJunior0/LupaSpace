<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/4bb4dfed16.js" crossorigin="anonymous"></script>
    <title>LupaSpace</title>
</head>
<body>
    <header>
        <nav>
            <div class="navbar-left">
                <a href="index.html" class="logo">LupaSpace</a>
                <input type="text" placeholder="Buscar por..." class="search-bar">
            </div>
            <ul class="navbar-right">
                <li><a href="#" class="singup">Cadastrar-se</a></li>
                <li><button onclick="window.location.href = 'login.html'" class="btn-login">Login</button></li>
            </ul>
            <div class="mobile-icon">
                <button class="btn-menu" onclick="menuShow()"><img src="assets/menu-icon.png" class="mobile-icon-img"></button>
            </div>
        </nav>
        <div class="mobile-menu">
            <ul>
                <li><a href="#" class="singup">Cadastrar-se</a></li>
                <li><button onclick="window.location.href = 'login.html'" class="btn-login">Login</button></li>
            </ul>
        </div>
        <hr>
    </header>
    <main>
        <div class="left-bar">
            <div class="tab-menu">
                <button class="tab-btn active" content-id="home"><i class="fa-solid fa-house"></i> Página Inicial</button>
                <button class="tab-btn" content-id="following"><i class="fa-solid fa-user"></i> Seguindo</button>
            </div>
        </div>
        <div class="tab-contents">
            <div class="content show" id="home">
                <h1 class="content-title">Ultimas publicações</h1>
                <button class="filter-btn">Filtrar por</button>
            </div>
            <div class="content" id="following">
                <h1 class="content-title">Seguindo</h1>
            </div>
        </div>
        <div class="right-bar"></div>
    </main>
    <script src="index.js"></script>
</body>
</html>
